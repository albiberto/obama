name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v2
  
      # QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1
        
      # Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      
      # Meta
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v4.0.1
        with:
          images: |
            docker.io/${{ github.repository }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-
            type=pep440,pattern={{raw}},prefix=staging-
            type=ref,event=branch,prefix=staging-
            type=ref,event=pr,prefix=staging-
          labels: |
            maintainer= ${{ github.author }}
            org.opencontainers.image.description=The Flappy-Alby game!
            org.opencontainers.image.vendor=AlbyCorp
            
      # Dockerhub
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: ./
          file: ./src/Obama/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
